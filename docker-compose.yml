name: rag-challenge

services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - rag_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
    image: rag-challenge-api:local
    restart: unless-stopped
    working_dir: /home/appuser
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_WARMUP_ENABLED: "true"
      APP_WARMUP_EMBED: "true"
      ENVIRONMENT: docker
      HOME: /home/appuser
      XDG_CACHE_HOME: /home/appuser/.cache
      HF_HOME: /home/appuser/.cache/huggingface
      TORCH_HOME: /home/appuser/.cache/torch
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "8000:8000"
    volumes:
      - ./.rapidocr_models:/usr/local/lib/python3.12/site-packages/rapidocr/models
      - ./.cache:/home/appuser/.cache
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rag_net

  ingest:
    image: rag-challenge-api:local
    profiles: ["tools"]
    working_dir: /home/appuser
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      HOME: /home/appuser
      XDG_CACHE_HOME: /home/appuser/.cache
      HF_HOME: /home/appuser/.cache/huggingface
      TORCH_HOME: /home/appuser/.cache/torch
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    command: ["python", "-m", "rag_challenge.ingestion.pipeline", "--doc-dir", "/workspace/dataset/dataset_documents"]
    volumes:
      - ./dataset:/workspace/dataset:ro
      - ./.rapidocr_models:/usr/local/lib/python3.12/site-packages/rapidocr/models
      - ./.cache:/home/appuser/.cache
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - rag_net

  eval:
    image: rag-challenge-api:local
    profiles: ["tools"]
    working_dir: /workspace
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      HOME: /home/appuser
      XDG_CACHE_HOME: /home/appuser/.cache
      HF_HOME: /home/appuser/.cache/huggingface
      TORCH_HOME: /home/appuser/.cache/torch
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      PYTHONPATH: /workspace/src
    entrypoint: []
    command: ["python", "-m", "rag_challenge.eval.harness", "--help"]
    volumes:
      - .:/workspace
      - ./.rapidocr_models:/usr/local/lib/python3.12/site-packages/rapidocr/models
      - ./.cache:/home/appuser/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - rag_net

networks:
  rag_net:
    driver: bridge

volumes:
  qdrant_storage:
