name: Feature Request
description: Suggest an idea
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's frustrating today?
      placeholder: "When I try to ... I have to ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Examples welcome.
      placeholder: "It would be great if `make eval` could..."
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Retrieval pipeline
        - Ingestion / embedding
        - Evaluation harness
        - API / server
        - Infrastructure / Docker
        - CI / tooling
        - Documentation
        - Other
    validations:
      required: true
